spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/guessthebeta}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

app:
  google-client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
  jwt-secret: ${JWT_SECRET:dev-secret-change-in-production}
  cors-origins: ${CORS_ORIGINS:http://localhost:5173}
